<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveCut</title>
    <!-- MUST be first script: registers service worker that injects COOP/COEP headers
         enabling SharedArrayBuffer (required by FFmpeg.wasm). On first load this
         registers the SW and reloads; subsequent loads are cross-origin isolated. -->
    <script src="./coi-serviceworker.js"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=__GA_MEASUREMENT_ID__"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '__GA_MEASUREMENT_ID__');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
